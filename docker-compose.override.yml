version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app.py:/app/app.py          # Монтируем файл для live reload
      - ./:/app
    ports:
      - "5000:5000"                    # Прямой доступ для отладки
      - "5678:5678"                    # Порт для дебаггера (Python debugpy)
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    command: python -m flask run --host=0.0.0.0 --port=5000 --debug